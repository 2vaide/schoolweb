<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBYROKI — Школьный портал</title>
    <link rel="stylesheet" href="main.css">
    <style>
        .typing-indicator { font-style: italic; color: #888; font-size: 0.9em; display: flex; align-items: center; gap: 8px; }
        .message-actions { display: flex; gap: 10px; margin-top: 5px; opacity: 0.7; transition: opacity 0.3s; }
        .message-actions:hover { opacity: 1; }
        .action-btn { background: none; border: none; color: #fa9021; cursor: pointer; padding: 2px; }
    </style>
</head>

<body>
    <div class="wrapper">
        <header class="container">
            <span class="logo">WEBYROKI</span>
            <nav>
                <ul>
                    <li class="active"><a href="#" onclick="switchView('view-home'); return false;">Домой</a></li>
                    <li><a href="#" onclick="switchView('view-chat'); return false;">Чат</a></li>
                    <li><a href="#" onclick="switchView('view-about'); return false;">О нас</a></li>
                    <li><a href="#" onclick="switchView('view-portfolio'); return false;">Портфолио</a></li>
                    <li><a href="#" onclick="switchView('view-news'); return false;">Новости</a></li>
                    <li class="btn"><a href="#" onclick="switchView('view-contacts'); return false;">Контакты</a></li>
                </ul>
            </nav>
        </header>

        <div id="chatSidebar" class="chat-sidebar">
            <button id="newChatBtn" class="new-chat-btn">
                <i data-lucide="plus"></i> Новый чат
            </button>
            <div class="chat-list" id="chatList">
                </div>
        </div>

        <button id="sidebarToggle" class="sidebar-toggle">
            <i data-lucide="panel-left"></i>
        </button>

        <div id="views-container">
            <div id="view-home" class="view-section active">
                <div class="hero container">
                    <div class="hero--info">
                        <h2>Знания превыше всего</h2>
                        <h1>Новости для школьников</h1>
                        <p>Вышел новый познавательный выпуск: "Математика в жизни каждого"</p>
                        <button class="btn" onclick="switchView('view-news')">Узнать больше</button>
                    </div>
                </div>
            </div>

            <div id="view-chat" class="view-section">
                <div class="search-container">
                    <div id="chat-messages" class="chat-messages"></div>
                    <div class="input-group">
                        <input type="search" id="searchInput" placeholder="Спроси что-нибудь..." autocomplete="off" />
                        <button id="micBtn" class="icon-btn" title="Голосовой ввод"><i data-lucide="mic"></i></button>
                        <button id="searchBtn" class="icon-btn" title="Отправить"><i data-lucide="send"></i></button>
                    </div>
                </div>
            </div>

            <div id="view-about" class="view-section glass-panel container" style="display:none;">
                <h1>🚀 О проекте WEBYROKI</h1>
                <p>Мы объединяем школьную программу с Искусственным Интеллектом.</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        // === НАСТРОЙКИ ===
        const USE_DEMO = false;
        // ЗАМЕНИТЕ ЭТОТ КЛЮЧ (Старый скомпрометирован!)
        const API_KEY = 'ВАШ_НОВЫЙ_PPLX_API_KEY'; 

        const searchContainer = document.querySelector('.search-container');
        const chatMessages = document.getElementById('chat-messages');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const micBtn = document.getElementById('micBtn');

        let chatHistory = JSON.parse(localStorage.getItem('schoolsite_history')) || [];
        let currentChatId = null;
        let currentMessages = [];

        lucide.createIcons();

        // === SPEECH RECOGNITION ===
        let recognition;
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            
            recognition.onstart = () => micBtn.classList.add('listening');
            recognition.onend = () => micBtn.classList.remove('listening');
            recognition.onresult = (event) => {
                searchInput.value = event.results[0][0].transcript;
            };

            micBtn.addEventListener('click', () => {
                try { recognition.start(); } catch (e) { console.error(e); }
            });
        }

        // === CHAT LOGIC ===
        function initSidebar() {
            renderChatList();
            const sidebar = document.getElementById('chatSidebar');
            document.getElementById('sidebarToggle').addEventListener('click', () => sidebar.classList.toggle('open'));
            document.getElementById('newChatBtn').addEventListener('click', () => {
                createNewChat();
                if (window.innerWidth < 768) sidebar.classList.remove('open');
            });
            createNewChat();
        }

        function createNewChat() {
            currentChatId = Date.now().toString();
            currentMessages = [];
            chatMessages.innerHTML = '';
            renderChatList();
        }

        function renderChatList() {
            const list = document.getElementById('chatList');
            list.innerHTML = '';
            chatHistory.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
                div.innerHTML = `<span><i data-lucide="message-square"></i> ${chat.title}</span>`;
                div.onclick = () => loadChat(chat.id);
                list.appendChild(div);
            });
            lucide.createIcons();
        }

        function loadChat(id) {
            const chat = chatHistory.find(c => c.id === id);
            if (!chat) return;
            currentChatId = chat.id;
            currentMessages = chat.messages;
            chatMessages.innerHTML = '';
            currentMessages.forEach(msg => restoreMessage(msg.text, msg.sender));
            renderChatList();
        }

        function restoreMessage(text, sender) {
            const { contentDiv, messageDiv } = addMessage(text, sender);
            if (sender === 'ai') {
                contentDiv.innerHTML = marked.parse(text.replace(/\[\d+\]/g, ''));
                addActionsToMessage(messageDiv, text);
            }
        }

        async function sendMessage() {
            const text = searchInput.value.trim();
            if (!text) return;

            currentMessages.push({ text: text, sender: 'user' });
            addMessage(text, 'user');
            searchInput.value = '';

            const { id: loadId, contentDiv: loadContent, messageDiv: loadDiv } = addMessage('Поиск информации...', 'ai', true);
            
            try {
                const response = await fetch('https://api.perplexity.ai/chat/completions', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': `Bearer ${API_KEY}` 
                    },
                    body: JSON.stringify({ 
                        model: "sonar", 
                        messages: [{ role: "user", content: text }] 
                    })
                });

                const data = await response.json();
                loadDiv.remove();

                if (data.error) throw new Error(data.error.message);

                const aiText = data.choices[0].message.content;
                currentMessages.push({ text: aiText, sender: 'ai' });
                
                // Сохраняем в историю
                const title = currentMessages[0].text.substring(0, 25);
                const idx = chatHistory.findIndex(c => c.id === currentChatId);
                if(idx === -1) chatHistory.unshift({id: currentChatId, title, messages: currentMessages});
                else chatHistory[idx].messages = currentMessages;
                localStorage.setItem('schoolsite_history', JSON.stringify(chatHistory));

                const { contentDiv, messageDiv } = addMessage('', 'ai');
                typeWriter(aiText, contentDiv, () => addActionsToMessage(messageDiv, aiText));
                renderChatList();

            } catch (error) {
                loadDiv.remove();
                addMessage('Ошибка: ' + error.message, 'ai');
            }
        }

        function typeWriter(text, element, callback) {
            let i = 0;
            function type() {
                if (i < text.length) {
                    element.innerHTML = marked.parse(text.substring(0, i + 1).replace(/\[\d+\]/g, ''));
                    i++;
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                    setTimeout(type, 5);
                } else if (callback) callback();
            }
            type();
        }

        function addMessage(text, sender, isStatus = false) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', `${sender}-message`);
            
            const contentDiv = document.createElement('div');
            contentDiv.classList.add('message-content');
            
            if (isStatus) {
                contentDiv.style.fontStyle = 'italic';
                contentDiv.style.opacity = '0.7';
            }

            contentDiv.textContent = text;
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            return { contentDiv, messageDiv };
        }

        function addActionsToMessage(messageDiv, text) {
            const actions = document.createElement('div');
            actions.className = 'message-actions';
            actions.innerHTML = `
                <button class="action-btn" title="Скопировать"><i data-lucide="copy"></i></button>
                <button class="action-btn" title="Озвучить"><i data-lucide="volume-2"></i></button>
            `;
            messageDiv.appendChild(actions);
            lucide.createIcons();
            
            actions.children[0].onclick = () => navigator.clipboard.writeText(text);
            actions.children[1].onclick = () => {
                const utterance = new SpeechSynthesisUtterance(text.replace(/[#*`]/g, ''));
                utterance.lang = 'ru-RU';
                window.speechSynthesis.speak(utterance);
            };
        }

        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(v => v.style.display = 'none');
            const target = document.getElementById(viewId);
            target.style.display = 'block';
            
            document.getElementById('sidebarToggle').style.display = (viewId === 'view-chat') ? 'block' : 'none';
        }

        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        searchBtn.addEventListener('click', sendMessage);

        initSidebar();
    </script>
</body>
</html>
