<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECO-LIFE — Твой гид по экологии</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* --- Базовые стили и переменные --- */
        :root {
            --eco-green: #2e7d32;
            --eco-light: #81c784;
            --eco-bg: #f1f8e9;
            --eco-text: #1b5e20;
            --white: #ffffff;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        body {
            background-color: var(--eco-bg);
            color: var(--eco-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Шапка --- */
        header {
            background: var(--white);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--eco-green);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        nav a {
            text-decoration: none;
            color: var(--eco-text);
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover { color: var(--eco-green); }

        /* --- Секции (Views) --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            flex: 1;
        }

        .view-section {
            display: none; /* Скрыты по умолчанию */
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        .view-section.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* --- Главная (Hero) --- */
        .hero {
            background: var(--white);
            padding: 60px;
            border-radius: 20px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .hero h1 { font-size: 2.5rem; margin-bottom: 15px; color: var(--eco-green); }
        .hero p { margin-bottom: 30px; font-size: 1.1rem; }

        .btn {
            background: var(--eco-green);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn:hover { background: var(--eco-light); }

        /* --- Чат --- */
        .search-container {
            background: var(--white);
            border-radius: 20px;
            height: 70vh;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
        }

        .user-message {
            align-self: flex-end;
            background: var(--eco-green);
            color: white;
        }

        .ai-message {
            align-self: flex-start;
            background: var(--eco-bg);
            color: var(--eco-text);
        }

        .input-group {
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #eee;
        }

        .input-group input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
        }

        /* --- Сайдбар --- */
        .chat-sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100%;
            width: 250px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            transform: translateX(-100%);
            transition: 0.3s;
            z-index: 1100;
            padding: 20px;
        }

        .chat-sidebar.open { transform: translateX(0); }

        .sidebar-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--eco-green);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 1200;
        }

        .typing::after {
            content: " 🌱";
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        @media (max-width: 768px) {
            header nav { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">🌿 ECO-LIFE</div>
        <nav>
            <ul>
                <li><a href="#" onclick="switchView('view-home')">Домой</a></li>
                <li><a href="#" onclick="switchView('view-chat')">Чат</a></li>
                <li><a href="#" onclick="switchView('view-about')">О проекте</a></li>
            </ul>
        </nav>
    </header>

    <div id="chatSidebar" class="chat-sidebar">
        <button class="btn" style="width:100%" onclick="createNewChat()">+ Новый чат</button>
        <div id="chatList" style="margin-top:20px"></div>
    </div>

    <button id="sidebarToggle" class="sidebar-toggle" onclick="toggleSidebar()">
        <i data-lucide="menu"></i>
    </button>

    <main class="container">
        <div id="view-home" class="view-section active">
            <div class="hero">
                <h1>Спасем планету вместе</h1>
                <p>Твой личный ИИ-помощник по вопросам экологии. Спроси о переработке или эко-привычках.</p>
                <button class="btn" onclick="switchView('view-chat')">Попробовать чат</button>
            </div>
        </div>

        <div id="view-chat" class="view-section">
            <div class="search-container">
                <div id="chat-messages" class="chat-messages"></div>
                <div class="input-group">
                    <input type="text" id="searchInput" placeholder="Напиши свой вопрос...">
                    <button class="btn" id="searchBtn">Отправить</button>
                </div>
            </div>
        </div>

        <div id="view-about" class="view-section">
            <div class="hero">
                <h1>О проекте ECO-LIFE</h1>
                <p>Мы используем искусственный интеллект, чтобы сделать экологические знания доступными каждому школьнику.</p>
            </div>
        </div>
    </main>

    <script>
        // Инициализация иконок
        lucide.createIcons();

        // Переключение вкладок
        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(viewId);
            if(target) target.classList.add('active');
            
            // Закрываем сайдбар при переключении
            document.getElementById('chatSidebar').classList.remove('open');
        }

        function toggleSidebar() {
            document.getElementById('chatSidebar').classList.toggle('open');
        }

        // Логика чата
        const API_KEY = 'ВАШ_КЛЮЧ_ЗДЕСЬ'; // Не забудь вставить ключ!
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const chatMessages = document.getElementById('chat-messages');

        async function sendMessage() {
            const text = searchInput.value.trim();
            if(!text) return;

            addMessage(text, 'user');
            searchInput.value = '';

            const statusMsg = addMessage('Ищу информацию...', 'ai');
            statusMsg.classList.add('typing');

            try {
                const response = await fetch('https://api.perplexity.ai/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "sonar",
                        messages: [
                            { role: "system", content: "Ты эксперт-эколог. Отвечай кратко и полезно." },
                            { role: "user", content: text }
                        ]
                    })
                });

                const data = await response.json();
                statusMsg.classList.remove('typing');
                statusMsg.innerHTML = marked.parse(data.choices[0].message.content);
                
            } catch (e) {
                statusMsg.textContent = "Ошибка: не удалось связаться с сервером.";
            }
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}-message`;
            div.textContent = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return div;
        }

        searchBtn.onclick = sendMessage;
        searchInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        function createNewChat() {
            chatMessages.innerHTML = '';
            toggleSidebar();
        }
    </script>
</body>
</html>
